<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="logo3.png" />
    <title>Sultan Pro | Glass Calculator</title>
    <link rel="stylesheet" href="calculator.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <div class="circle"></div>
        <div class="circle"></div>
        
        <div class="calculator">
            <div class="brand">SULTAN ANALYTICS</div>
            <input type="text" id="display" readonly placeholder="0" />
            
            <div class="buttons">
                <button onclick="clearAll()" class="btn-alt">AC</button>
                <button onclick="lastDelete()" class="btn-alt">DC</button>
                <button onclick="appendValue('%')" class="btn-op">%</button>
                <button onclick="appendValue('/')" class="btn-op">/</button>

                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button onclick="appendValue('*')" class="btn-op">×</button>

                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button onclick="appendValue('-')" class="btn-op">−</button>

                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button onclick="appendValue('+')" class="btn-op">+</button>

                <button onclick="appendValue('0')">0</button>
                <button onclick="appendValue('00')">00</button>
                <button onclick="appendValue('.')">.</button>
                <button onclick="calculate()" class="btn-eq">=</button>
            </div>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
